{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<title>Procurement Office | Central Portal</title>
	<link rel="icon" type="image/jpg" href="{% static 'images/wmsu_favicon.png' %}">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
		rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		* {
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
		}

		input:focus {
			outline: none;
			ring: 2px;
			ring-offset: 2px;
		}
	</style>
</head>

<body class="flex flex-col min-h-screen">

	<!-- Background -->
	<div class="fixed inset-0 -z-10">
		<img src="{% static 'images/wmsu.jpg' %}" alt="Procurement background"
			class="object-cover w-full h-full opacity-30">
		<!-- Transparent red overlay -->
		<div class="absolute inset-0 bg-red-500/30"></div>
	</div>

	<!-- Header with Logo -->
	{% include 'components/header.html' %}

	<main class="flex items-center justify-center flex-grow p-5">
		<!-- Changed from max-w-md to max-w-lg for wider card -->
		<div
			class="w-full max-w-lg p-8 transition-all duration-300 border border-gray-200 shadow-2xl bg-white/95 backdrop-blur-sm rounded-2xl md:p-10">

			<!-- Decorative red line -->
			<div class="w-20 h-1 mx-auto mb-5 rounded-full bg-gradient-to-r from-red-500 to-red-300"></div>

			<div class="mb-6 text-center">
				<h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
				<p class="mt-1 text-sm text-gray-500">Sign in to access the procurement system</p>
			</div>

			<form id="login-form" method="post" action="">
				{% csrf_token %}
				
				<!-- Reduced space-y from 5 to 4 -->
				<div class="space-y-4">
					<div>
						<label class="block mb-2 text-sm font-medium text-gray-700">Username</label>
						<input type="text" name="username" required
							class="w-full px-4 py-3 transition-all duration-200 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 focus:ring-1 focus:ring-red-400"
							placeholder="Enter your username">
					</div>

					<div>
						<label class="block mb-2 text-sm font-medium text-gray-700">Password</label>
						<div class="relative">
							<input type="password" name="password" id="password" required
								class="w-full px-4 py-3 pr-12 transition-all duration-200 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 focus:ring-1 focus:ring-red-400"
								placeholder="Enter your password">
							<button type="button"
								class="absolute text-gray-400 transition -translate-y-1/2 toggle-password right-3 top-1/2 hover:text-gray-600"
								data-target="password">
								<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</svg>
							</button>
						</div>
					</div>

					{{ form.errors }}

					<button type="submit"
						class="w-full py-3 font-semibold text-white transition-all duration-200 transform shadow-md bg-gradient-to-r from-red-700 to-red-800 hover:from-red-800 hover:to-red-900 rounded-xl active:scale-95">
						Log In
					</button>
				</div>
				
				<!-- Reduced spacing between buttons -->
				<div class="mt-4">
					<!-- Forgot Password Link -->
					<div class="text-center">
						<a href="{% url 'users:password_reset' %}" 
						   class="inline-flex items-center gap-1 text-sm text-gray-600 transition duration-200 hover:text-red-600 group">
							<svg class="w-4 h-4 transition-transform group-hover:translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7.5a2.25 2.25 0 00-1.5-2.25h-3A2.25 2.25 0 009 7.5m7.5 0v6m-7.5-6v6M3 12h18M6 9.75v6.75a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 16.5V9.75" />
							</svg>
							<span>Forgot your password?</span>
						</a>
					</div>
					
					<!-- Divider with reduced margin -->
					<div class="relative my-3">
						<div class="absolute inset-0 flex items-center">
							<div class="w-full border-t border-gray-200"></div>
						</div>
						<div class="relative flex justify-center text-sm">
							<span class="px-3 text-gray-500 bg-white/95">or</span>
						</div>
					</div>
					
					<!-- Register button -->
					<a href="{% url 'users:office_register' %}"
						class="block w-full px-4 py-3 font-medium text-center text-gray-700 no-underline transition duration-200 bg-gray-100 border border-gray-300 shadow-sm cursor-pointer hover:bg-gray-200 rounded-xl hover:shadow-md">
						Register your College
					</a>
				</div>
			</form>
		</div>
	</main>

	<script>
		// Password visibility toggle
		document.querySelectorAll('.toggle-password').forEach(button => {
			button.addEventListener('click', function(e) {
				const targetId = this.getAttribute('data-target');
				const input = document.getElementById(targetId);
				if (input) {
					const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
					input.setAttribute('type', type);
					const svg = this.querySelector('svg');
					if (svg) {
						if (type === 'text') {
							svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-5 0-9.27-3.11-11-7.5a10.07 10.07 0 0 1 2.06-2.94M9.9 4.24C10.59 4.08 11.29 4 12 4c5 0 9.27 3.11 11 7.5a10.43 10.43 0 0 1-4 4.46M2 2l20 20"/><circle cx="12" cy="12" r="3"/>';
						} else {
							svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
						}
					}
				}
			});
		});
	</script>
</body>

</html>
