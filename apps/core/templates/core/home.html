{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<title>Procurement Office | Central Portal</title>
	<link rel="icon" type="image/jpg" href="{% static 'images/wmsu_favicon.png' %}">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
		rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		* {
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
		}

		input:focus {
			outline: none;
			ring: 2px;
			ring-offset: 2px;
		}
	</style>
</head>

<body class="min-h-screen flex flex-col">

	<!-- Background -->
	<div class="fixed inset-0 -z-10">
		<img src="{% static 'images/wmsu.jpg' %}" alt="Procurement background"
			class="w-full h-full object-cover opacity-30">
		<!-- Transparent red overlay -->
		<div class="absolute inset-0 bg-red-500/30"></div>
	</div>

	<!-- Header with Logo -->
	<header class="w-full bg-gradient-to-r from-red-800 to-red-700 shadow-lg sticky top-0 z-20">
		<div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between flex-wrap gap-3">
			<div class="flex items-center gap-3">
				<!-- Logo Image - Full Circle -->
				<div
					class="w-14 h-14 rounded-full flex items-center justify-center overflow-hidden bg-white shadow-md border border-gray-200">
					<img src="{% static 'images/wmsu_logo.png' %}" alt="WMSU Logo" class="w-10 h-10 object-contain">
				</div>
				<div>
					<h1 class="text-white font-bold text-xl tracking-tight">PROCUREMENT<span
							class="font-light">OFFICE</span></h1>
					<p class="text-red-100 text-xs">Centralized e‑procurement hub</p>
				</div>
			</div>
		</div>
	</header>

	<main class="flex-grow flex items-center justify-center p-5">
		<!-- Changed from max-w-md to max-w-lg for wider card -->
		<div
			class="w-full max-w-lg bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-200 p-8 md:p-10 transition-all duration-300">

			<!-- Decorative red line -->
			<div class="w-20 h-1 bg-gradient-to-r from-red-500 to-red-300 mx-auto mb-5 rounded-full"></div>

			<div class="text-center mb-6">
				<h2 class="text-3xl font-bold text-gray-800">Welcome Back</h2>
				<p class="text-gray-500 text-sm mt-1">Sign in to access the procurement system</p>
			</div>

			<form id="login-form" method="post" action="">
				{% csrf_token %}
				
				<!-- Reduced space-y from 5 to 4 -->
				<div class="space-y-4">
					<div>
						<label class="block text-gray-700 font-medium text-sm mb-2">Username</label>
						<input type="text" name="username" required
							class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 focus:ring-1 focus:ring-red-400 transition-all duration-200"
							placeholder="Enter your username">
					</div>

					<div>
						<label class="block text-gray-700 font-medium text-sm mb-2">Password</label>
						<div class="relative">
							<input type="password" name="password" id="password" required
								class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 focus:ring-1 focus:ring-red-400 transition-all duration-200 pr-12"
								placeholder="Enter your password">
							<button type="button"
								class="toggle-password absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition"
								data-target="password">
								<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
									<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
									<circle cx="12" cy="12" r="3"></circle>
								</svg>
							</button>
						</div>
					</div>

					{{ form.errors }}

					<button type="submit"
						class="w-full bg-gradient-to-r from-red-700 to-red-800 hover:from-red-800 hover:to-red-900 text-white font-semibold py-3 rounded-xl shadow-md transition-all duration-200 transform active:scale-95">
						Log In
					</button>
				</div>
				
				<!-- Reduced spacing between buttons -->
				<div class="mt-4">
					<!-- Forgot Password Link -->
					<div class="text-center">
						<a href="{% url 'users:account_verification' %}" 
						   class="inline-flex items-center gap-1 text-sm text-gray-600 hover:text-red-600 transition duration-200 group">
							<svg class="w-4 h-4 transition-transform group-hover:translate-x-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
								<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7.5a2.25 2.25 0 00-1.5-2.25h-3A2.25 2.25 0 009 7.5m7.5 0v6m-7.5-6v6M3 12h18M6 9.75v6.75a2.25 2.25 0 002.25 2.25h7.5A2.25 2.25 0 0018 16.5V9.75" />
							</svg>
							<span>Forgot your password?</span>
						</a>
					</div>
					
					<!-- Divider with reduced margin -->
					<div class="relative my-3">
						<div class="absolute inset-0 flex items-center">
							<div class="w-full border-t border-gray-200"></div>
						</div>
						<div class="relative flex justify-center text-sm">
							<span class="px-3 bg-white/95 text-gray-500">or</span>
						</div>
					</div>
					
					<!-- Register button -->
					<a href="{% url 'users:register_college' %}"
						class="block w-full text-center py-3 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-xl border border-gray-300 transition duration-200 cursor-pointer shadow-sm no-underline hover:shadow-md">
						Register your College
					</a>
				</div>
			</form>
		</div>
	</main>

	<script>
		// Password visibility toggle
		document.querySelectorAll('.toggle-password').forEach(button => {
			button.addEventListener('click', function(e) {
				const targetId = this.getAttribute('data-target');
				const input = document.getElementById(targetId);
				if (input) {
					const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
					input.setAttribute('type', type);
					const svg = this.querySelector('svg');
					if (svg) {
						if (type === 'text') {
							svg.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 19c-5 0-9.27-3.11-11-7.5a10.07 10.07 0 0 1 2.06-2.94M9.9 4.24C10.59 4.08 11.29 4 12 4c5 0 9.27 3.11 11 7.5a10.43 10.43 0 0 1-4 4.46M2 2l20 20"/><circle cx="12" cy="12" r="3"/>';
						} else {
							svg.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
						}
					}
				}
			});
		});
	</script>
</body>

</html>
