{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
	<title>Procurement Office | Central Portal</title>
	<link rel="icon" type="image/jpg" href="{% static 'images/wmsu_favicon.png' %}">
	<link
		href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
		rel="stylesheet">
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		* {
			font-family: 'Inter', system-ui, -apple-system, sans-serif;
		}

		input:focus {
			outline: none;
			ring: 2px;
			ring-offset: 2px;
		}
	</style>
</head>

<body class="min-h-screen flex flex-col">

	<!-- Background -->
	<div class="fixed inset-0 -z-10">
		<img src="{% static 'images/wmsu.jpg' %}" alt="Procurement background"
			class="w-full h-full object-cover opacity-30">
		<div class="absolute inset-0 bg-white/80"></div>
	</div>

	<!-- Header with Logo -->
	<header class="w-full bg-gradient-to-r from-red-800 to-red-700 shadow-lg sticky top-0 z-20">
		<div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between flex-wrap gap-3">
			<div class="flex items-center gap-3">
				<div
					class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-md border border-gray-200">
					<img src="{% static 'images/wmsu_logo.png' %}" alt="WMSU Logo" class="w-10 h-10 object-contain">
				</div>
				<div>
					<h1 class="text-white font-bold text-xl tracking-tight">PROCUREMENT<span
							class="font-light">OFFICE</span></h1>
					<p class="text-red-100 text-xs">Centralized e‑procurement hub</p>
				</div>
			</div>
		</div>
	</header>

	<main class="flex-grow flex items-center justify-center p-5">
		<div
			class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-200 p-8 md:p-10 transition-all duration-300">

			<!-- Decorative red line -->
			<div class="w-20 h-1 bg-gradient-to-r from-red-500 to-red-300 mx-auto mb-5 rounded-full"></div>

			<div class="text-center mb-8">
				<h2 class="text-3xl font-bold text-gray-800">Procurement Office</h2>
				<p class="text-gray-500 text-sm mt-1">Central access control</p>
			</div>

			<form id="login-form" class="space-y-5" method="post" action="">
				{% csrf_token %}
				<div>
					<label class="block text-gray-700 font-medium text-sm mb-2">Enter your Email</label>
					<input type="email" name="email" required
						class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200"
						placeholder="your.email@example.com">
				</div>

				<div>
					<label class="block text-gray-700 font-medium text-sm mb-2">Enter your Password</label>
					<input type="password" name="password" required
						class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200"
						placeholder="········">
				</div>

				<button type="submit"
					class="w-full bg-gradient-to-r from-red-700 to-red-800 hover:from-red-800 hover:to-red-900 text-white font-semibold py-3 rounded-xl shadow-md transition-all duration-200">
					Log In
				</button>

				<a href="{% url 'users:register_user' %}"
					class="block w-full text-center py-3.5 px-4 bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium rounded-xl border border-gray-300 transition duration-200 cursor-pointer shadow-sm">
					Register as User
				</a>
			</form>
		</div>
	</main>

	<script>
		const loginForm = document.getElementById('login-form');

		if (loginForm) {
			loginForm.addEventListener('submit', (e) => {
				e.preventDefault();
				const email = loginForm.querySelector('input[name="email"]').value.trim();
				const password = loginForm.querySelector('input[name="password"]').value;

				if (!email) {
					alert("Please enter your email.");
					return;
				}
				if (!password) {
					alert("Please enter your password.");
					return;
				}

				alert(`🔐 Login attempt (demo).\nWelcome ${email}\nRedirecting to dashboard.`);
				window.location.href = "#";
			});
		}
	</script>
</body>

</html>
