{% extends 'base.html' %}
{% load static %}

{% block title %}Drafts | PPMP Requests{% endblock %}

{% block header_subtitle %}Manage and review draft PPMP submissions{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-8 max-w-7xl">
    <!-- Filters -->
    <div class="flex flex-wrap gap-4 justify-between items-center mb-8">
        <div class="flex gap-3">
            <select id="statusFilter" class="px-4 py-2 border border-gray-300 rounded-lg">
                <option value="all">All Status</option>
                <option value="draft">Draft</option>
                <option value="submitted">Submitted</option>
                <option value="accepted">Accepted</option>
                <option value="rejected">Rejected</option>
            </select>
            <input type="text" id="searchOffice" placeholder="Search office..." class="px-4 py-2 border border-gray-300 rounded-lg w-64">
        </div>
    </div>

    <!-- Offices Grid -->
    <div id="officesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
    <div id="emptyState" class="hidden text-center py-12">
        <svg class="w-24 h-24 text-gray-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z" />
        </svg>
        <h3 class="text-lg font-medium text-gray-900 mb-2">No offices found</h3>
        <p class="text-gray-500">Try adjusting your search or filter.</p>
    </div>
</div>

<script>
    // ---------- SAMPLE DATA ----------
    const officesData = [
        {
            id: 1,
            name: "Registrar's Office",
            code: "REG",
            department: "Academic Affairs",
            head: "Dr. Maria Santos",
            ppmpCount: 3,
            statusCounts: { draft: 1, submitted: 1, accepted: 0, rejected: 1 },
            ppmpList: [
                { id: "PPMP-2026-001", title: "Supply and Delivery of ICT Equipment", status: "submitted", priority: "High", dateSubmitted: "2026-03-15", description: "20 desktops, 10 laptops", estimatedBudget: "1,250,000.00" },
                { id: "PPMP-2026-015", title: "Office Furniture Procurement", status: "draft", priority: "Medium", dateSubmitted: "2026-03-10", description: "Ergonomic chairs", estimatedBudget: "450,000.00" },
                { id: "PPMP-2026-023", title: "Office Supplies", status: "rejected", priority: "Low", dateSubmitted: "2026-03-05", description: "Bond paper, pens", estimatedBudget: "75,000.00" }
            ]
        },
        {
            id: 2,
            name: "College of Engineering",
            code: "COE",
            department: "Academics",
            head: "Dr. Juan Dela Cruz",
            ppmpCount: 5,
            statusCounts: { draft: 2, submitted: 2, accepted: 1, rejected: 0 },
            ppmpList: [
                { id: "PPMP-2026-002", title: "Laboratory Equipment", status: "submitted", priority: "High", dateSubmitted: "2026-03-14", description: "Instruments", estimatedBudget: "2,500,000.00" },
                { id: "PPMP-2026-008", title: "Construction Materials", status: "submitted", priority: "Medium", dateSubmitted: "2026-03-12", description: "Student projects", estimatedBudget: "850,000.00" },
                { id: "PPMP-2026-018", title: "Software Licenses", status: "draft", priority: "High", dateSubmitted: "2026-03-08", description: "AutoCAD, MATLAB", estimatedBudget: "1,200,000.00" },
                { id: "PPMP-2026-025", title: "Safety Equipment", status: "accepted", priority: "High", dateSubmitted: "2026-03-03", description: "PPE", estimatedBudget: "180,000.00" },
                { id: "PPMP-2026-032", title: "Office Renovation", status: "draft", priority: "Low", dateSubmitted: "2026-02-28", description: "Repair", estimatedBudget: "350,000.00" }
            ]
        },
        {
            id: 3,
            name: "College of Medicine",
            code: "COM",
            department: "Academics",
            head: "Dr. Ana Reyes",
            ppmpCount: 4,
            statusCounts: { draft: 1, submitted: 2, accepted: 0, rejected: 1 },
            ppmpList: [
                { id: "PPMP-2026-003", title: "Medical Equipment", status: "submitted", priority: "High", dateSubmitted: "2026-03-13", description: "Diagnostic tools", estimatedBudget: "3,200,000.00" },
                { id: "PPMP-2026-012", title: "Laboratory Supplies", status: "submitted", priority: "High", dateSubmitted: "2026-03-11", description: "Chemicals", estimatedBudget: "950,000.00" },
                { id: "PPMP-2026-020", title: "Medical Books", status: "draft", priority: "Medium", dateSubmitted: "2026-03-07", description: "Reference books", estimatedBudget: "420,000.00" },
                { id: "PPMP-2026-028", title: "Training Mannequins", status: "rejected", priority: "High", dateSubmitted: "2026-03-01", description: "CPR simulators", estimatedBudget: "1,800,000.00" }
            ]
        }
    ];

    function getStatusBadge(status) {
        const badges = { draft: 'bg-gray-100 text-gray-800', submitted: 'bg-yellow-100 text-yellow-800', accepted: 'bg-green-100 text-green-800', rejected: 'bg-red-100 text-red-800' };
        const labels = { draft: 'Draft', submitted: 'Submitted', accepted: 'Accepted', rejected: 'Rejected' };
        return `<span class="px-2 py-1 text-xs font-semibold rounded-full ${badges[status]}">${labels[status]}</span>`;
    }

    function renderOffices() {
        const grid = document.getElementById('officesGrid');
        const searchTerm = document.getElementById('searchOffice').value.toLowerCase();
        const statusFilter = document.getElementById('statusFilter').value;

        let filtered = officesData.filter(office => {
            const matchesSearch = office.name.toLowerCase().includes(searchTerm) || office.code.toLowerCase().includes(searchTerm);
            if (statusFilter === 'all') return matchesSearch;
            return matchesSearch && office.ppmpList.some(p => p.status === statusFilter);
        });

        if (filtered.length === 0) {
            grid.classList.add('hidden');
            document.getElementById('emptyState').classList.remove('hidden');
            return;
        }
        grid.classList.remove('hidden');
        document.getElementById('emptyState').classList.add('hidden');
        grid.innerHTML = filtered.map(office => `
            <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden hover:shadow-md transition cursor-pointer" onclick="selectOffice(${office.id})">
                <div class="p-6">
                    <div class="flex justify-between items-start mb-4">
                        <div><h3 class="text-lg font-semibold text-gray-800">${office.name}</h3><p class="text-sm text-gray-500">${office.department}</p></div>
                        <div class="bg-blue-100 rounded-full px-3 py-1"><span class="text-xs font-medium text-blue-600">${office.code}</span></div>
                    </div>
                    <p class="text-sm text-gray-600 mb-4">Head: ${office.head}</p>
                    <div class="grid grid-cols-4 gap-2 mb-4 text-center">
                        <div class="bg-gray-50 rounded-lg p-2"><p class="text-xs text-gray-500">Total</p><p class="text-lg font-bold">${office.ppmpCount}</p></div>
                        <div class="bg-yellow-50 rounded-lg p-2"><p class="text-xs text-yellow-600">Submitted</p><p class="text-lg font-bold text-yellow-700">${office.statusCounts.submitted}</p></div>
                        <div class="bg-green-50 rounded-lg p-2"><p class="text-xs text-green-600">Accepted</p><p class="text-lg font-bold text-green-700">${office.statusCounts.accepted}</p></div>
                        <div class="bg-red-50 rounded-lg p-2"><p class="text-xs text-red-600">Rejected</p><p class="text-lg font-bold text-red-700">${office.statusCounts.rejected}</p></div>
                    </div>
                    <div class="border-t pt-3"><p class="text-xs text-gray-500 mb-2">Recent PPMPs:</p>${office.ppmpList.slice(0,2).map(p => `<div class="flex justify-between text-sm"><span>${p.title}</span>${getStatusBadge(p.status)}</div>`).join('')}${office.ppmpCount>2 ? `<p class="text-xs text-blue-600 mt-1">+${office.ppmpCount-2} more</p>` : ''}</div>
                </div>
                <div class="bg-gray-50 px-6 py-3 border-t"><p class="text-sm text-blue-600">View all PPMPs →</p></div>
            </div>
        `).join('');
    }

    function selectOffice(officeId) {
        const office = officesData.find(o => o.id === officeId);
        localStorage.setItem('selectedOffice', JSON.stringify(office));
        window.location.href = `/list_page/?office_id=${officeId}`;
    }

    document.getElementById('searchOffice').addEventListener('input', renderOffices);
    document.getElementById('statusFilter').addEventListener('change', renderOffices);
    renderOffices();
</script>
{% endblock %}
