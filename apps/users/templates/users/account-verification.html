{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Procurement Office</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { font-family: 'Inter', sans-serif; }
    .wider-card { max-width: 56rem; }
  </style>
</head>

<body class="min-h-screen flex flex-col">

<!-- Background -->
<div class="fixed inset-0 -z-10">
  <img src="{% static 'images/wmsu.jpg' %}" class="w-full h-full object-cover opacity-30">
  <div class="absolute inset-0 bg-white/80"></div>
</div>

<!-- Header -->
<header class="bg-red-800 text-white p-4 shadow">
  <h1 class="text-xl font-bold">PROCUREMENT OFFICE</h1>
</header>

<!-- MAIN -->
<main class="flex-grow flex items-center justify-center p-6">
  <div class="wider-card w-full bg-white rounded-2xl shadow-xl p-8">

    <h2 class="text-2xl font-bold mb-6 text-center">Reset Password</h2>

    <!-- Form that redirects to the email-sent page -->
    <form method="post" action="{% url 'users:email_sent' %}">
      {% csrf_token %}

      <div class="space-y-6 mb-8">
        <!-- Email -->
        <div class="w-full">
          <label class="block text-sm font-medium mb-2">Email Address</label>
          <input type="email" name="email" required
                 class="w-full px-4 py-3 border rounded-xl focus:border-red-400 focus:ring-1 focus:ring-red-400"
                 placeholder="Enter your email">
        </div>
      </div>

      <!-- Reset Password Button (submits the form) -->
      <div class="flex justify-end mt-8">
        <button type="submit" class="px-8 py-3 bg-red-700 text-white rounded-xl hover:bg-red-800 transition">
          Reset Password
        </button>
      </div>
    </form>

  </div>
</main>

</body>
</html>
