{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password Sent | Procurement Office</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { font-family: 'Inter', sans-serif; }
    .wider-card { max-width: 56rem; }
  </style>
</head>

<body class="flex flex-col min-h-screen">

<!-- Background -->
<div class="fixed inset-0 -z-10">
  <img src="{% static 'images/wmsu.jpg' %}" class="object-cover w-full h-full opacity-30">
  <div class="absolute inset-0 bg-white/80"></div>
</div>

<!-- Header -->
<header class="p-4 text-white bg-red-800 shadow">
  <h1 class="text-xl font-bold">PROCUREMENT OFFICE</h1>
</header>

<!-- MAIN -->
<main class="flex items-center justify-center flex-grow p-6">
  <div class="w-full p-8 bg-white shadow-xl wider-card rounded-2xl">

    <!-- Success Icon -->
    <div class="flex justify-center mb-4">
      <div class="p-3 bg-green-100 rounded-full">
        <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11v4m0-8h.01" />
        </svg>
      </div>
    </div>

    <h2 class="mb-3 text-2xl font-bold text-center text-gray-800">Check Your Email</h2>

    <div class="mb-4 text-center text-gray-600">
      <p>A password reset link has been sent to your email address.</p>
      <p class="mt-2 text-sm text-gray-500">Please check your inbox (and spam folder) and follow the instructions to reset your password.</p>
    </div>

    <!-- Back to Login Link -->
    <div class="flex justify-center mt-6">
      <a href="{% url 'core:home' %}" class="font-medium text-red-600 underline hover:text-red-800 underline-offset-2">
        ← Return to login page
      </a>
    </div>
  </div>
</main>

</body>
</html>
