{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password | Procurement Office</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    * { font-family: 'Inter', sans-serif; }
    .wider-card { max-width: 56rem; }
  </style>
</head>

<body class="flex flex-col min-h-screen">

<!-- Background -->
<div class="fixed inset-0 -z-10">
  <img src="{% static 'images/wmsu.jpg' %}" class="object-cover w-full h-full opacity-30">
  <div class="absolute inset-0 bg-white/80"></div>
</div>

<!-- Header -->
<header class="p-4 text-white bg-red-800 shadow">
  <h1 class="text-xl font-bold">PROCUREMENT OFFICE</h1>
</header>

<!-- MAIN -->
<main class="flex items-center justify-center flex-grow p-6">
  <div class="w-full p-8 bg-white shadow-xl wider-card rounded-2xl">

    <h2 class="mb-6 text-2xl font-bold text-center">Reset Password</h2>

    <!-- Form that redirects to the email-sent page -->
    <form method="post" action="">
      {% csrf_token %}

      <div class="mb-8 space-y-6">
        <!-- Email -->
        <div class="w-full">
          <label for="{{ form.email.id_for_label }}" class="block mb-2 text-sm font-medium">Email Address</label>
          {{ form.email }}
        </div>
      </div>

      <!-- Reset Password Button (submits the form) -->
      <div class="flex justify-end mt-8">
        <button type="submit" class="px-8 py-3 text-white transition bg-red-700 rounded-xl hover:bg-red-800">
          Reset Password
        </button>
      </div>
    </form>

  </div>
</main>

</body>
</html>
