{% load static %}
<!-- Background -->
<div class="fixed inset-0 -z-10">
    <img src="{% static 'images/wmsu.jpg' %}" alt="Procurement background"
        class="object-cover w-full h-full opacity-30">
    <!-- Transparent red overlay -->
    <div class="absolute inset-0 bg-red-500/30"></div>
</div>

<!-- Header with Logo -->
<header class="sticky top-0 z-20 w-full shadow-lg bg-gradient-to-r from-red-800 to-red-700">
    <div class="flex flex-wrap items-center justify-between gap-3 px-4 py-3 mx-auto max-w-7xl sm:px-5">
        <!-- Logo Section -->
        <div class="flex items-center gap-2 sm:gap-3">
            <div class="flex items-center justify-center overflow-hidden bg-white border border-gray-200 rounded-full shadow-md w-10 h-10 sm:w-14 sm:h-14">
                <img src="{% static 'images/wmsu_logo.png' %}" alt="WMSU Logo" class="object-contain w-7 h-7 sm:w-10 sm:h-10">
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-tight text-white sm:text-xl">PROCUREMENT<span class="font-light">OFFICE</span></h1>
                <p class="text-[10px] text-red-100 sm:text-xs">Centralized e‑procurement hub</p>
            </div>
        </div>

        <!-- Navigation Buttons with Icons & Tooltips -->
        <nav class="flex items-center gap-1 sm:gap-2">
            <!-- Home Link -->
            {% if request.resolver_match.url_name == 'home' %}
                <div class="relative group">
                    <a href="{% url 'core:home' %}"
                        class="relative flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 text-white transition-all duration-200 rounded-md bg-red-600 shadow-sm">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                        <!-- Minimal indicator dot -->
                        <span class="absolute -top-0.5 -right-0.5 flex h-2 w-2">
                            <span class="absolute inline-flex w-full h-full bg-green-400 rounded-full opacity-75 animate-ping"></span>
                            <span class="relative inline-flex w-2 h-2 bg-green-500 rounded-full"></span>
                        </span>
                    </a>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 px-2 py-1 text-xs text-white bg-gray-800 rounded-md opacity-0 group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap pointer-events-none">
                        Home
                    </div>
                </div>
            {% else %}
                <div class="relative group">
                    <a href="{% url 'core:home' %}"
                        class="flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 text-white transition-all duration-200 rounded-md hover:bg-red-600/50">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
                        </svg>
                    </a>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 px-2 py-1 text-xs text-white bg-gray-800 rounded-md opacity-0 group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap pointer-events-none">
                        Home
                    </div>
                </div>
            {% endif %}

            <!-- About Us Link -->
            {% if request.resolver_match.url_name == 'about' %}
                <div class="relative group">
                    <a href="{% url 'core:about' %}"
                        class="relative flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 text-white transition-all duration-200 rounded-md bg-red-600 shadow-sm">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                        <!-- Minimal indicator dot -->
                        <span class="absolute -top-0.5 -right-0.5 flex h-2 w-2">
                            <span class="absolute inline-flex w-full h-full bg-green-400 rounded-full opacity-75 animate-ping"></span>
                            <span class="relative inline-flex w-2 h-2 bg-green-500 rounded-full"></span>
                        </span>
                    </a>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 px-2 py-1 text-xs text-white bg-gray-800 rounded-md opacity-0 group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap pointer-events-none">
                        About Us
                    </div>
                </div>
            {% else %}
                <div class="relative group">
                    <a href="{% url 'core:about' %}"
                        class="flex items-center justify-center w-8 h-8 sm:w-9 sm:h-9 text-white transition-all duration-200 rounded-md hover:bg-red-600/50">
                        <svg class="w-4 h-4 sm:w-5 sm:h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                                d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                        </svg>
                    </a>
                    <!-- Tooltip -->
                    <div class="absolute bottom-full left-1/2 transform -translate-x-1/2 mb-2 px-2 py-1 text-xs text-white bg-gray-800 rounded-md opacity-0 group-hover:opacity-100 transition-opacity duration-200 whitespace-nowrap pointer-events-none">
                        About Us
                    </div>
                </div>
            {% endif %}
        </nav>
    </div>
</header>
