{% load static %}
<!-- Background -->
<div class="fixed inset-0 -z-10">
    <img src="{% static 'images/wmsu.jpg' %}" alt="Procurement background"
        class="object-cover w-full h-full opacity-30">
    <!-- Transparent red overlay -->
    <div class="absolute inset-0 bg-red-500/30"></div>
</div>

<!-- Header with Logo -->
<header class="sticky top-0 z-20 w-full shadow-lg bg-gradient-to-r from-red-800 to-red-700">
		<div class="flex flex-wrap items-center justify-between gap-3 px-5 py-3 mx-auto max-w-7xl">
			<div class="flex items-center gap-3">
				<!-- Logo Image - Full Circle -->
				<div
					class="flex items-center justify-center overflow-hidden bg-white border border-gray-200 rounded-full shadow-md w-14 h-14">
					<img src="{% static 'images/wmsu_logo.png' %}" alt="WMSU Logo" class="object-contain w-10 h-10">
				</div>
				<div>
					<h1 class="text-xl font-bold tracking-tight text-white">PROCUREMENT<span
							class="font-light">OFFICE</span></h1>
					<p class="text-xs text-red-100">Centralized e‑procurement hub</p>
				</div>
			</div>
			<!-- Navigation Buttons -->
			<nav class="flex items-center gap-2">
				<a href="{% url 'core:home' %}"
					class="px-4 py-2 text-sm font-medium text-white transition rounded-md hover:bg-red-600">Home</a>
				<a href="{% url 'core:about' %}"
					class="px-4 py-2 text-sm font-medium text-white transition rounded-md hover:bg-red-600">About Us</a>
			</nav>
		</div>
	</header>
