{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>User Information | Procurement Office</title>
  <!-- TailwindCSS v3 + Google Fonts -->
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    input:focus, textarea:focus, select:focus {
      outline: none;
      ring: 2px;
      ring-offset: 2px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <!-- BACKGROUND IMAGE PLACEHOLDER (full screen, behind all content) -->
  <div class="fixed inset-0 -z-10">
    <img src="{% static 'images/wmsu.jpg' %}" alt="Procurement background" class="w-full h-full object-cover opacity-30">
    <div class="absolute inset-0 bg-white/80"></div>
  </div>

  <!-- HEADER with Logo placeholder & red-ish accents -->
  <header class="w-full bg-gradient-to-r from-red-800 to-red-700 shadow-lg sticky top-0 z-20">
    <div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between flex-wrap gap-3">
      <!-- Logo placeholder (explicit container) -->
      <div class="flex items-center gap-3">
        <!-- Logo container with white background to make red logo stand out -->
        <div class="w-14 h-14 bg-white rounded-2xl flex items-center justify-center shadow-md border border-gray-200">
          <img src="{% static 'images/wmsu_logo.png' %}" alt="WMSU Logo" class="w-10 h-10 object-contain">
        </div>
        <div>
          <h1 class="text-white font-bold text-xl tracking-tight">PROCUREMENT<span class="font-light">OFFICE</span></h1>
          <p class="text-red-100 text-xs">Centralized e‑procurement hub</p>
        </div>
      </div>
    </div>
  </header>

  <!-- MAIN CONTENT: User Information Form -->
  <main class="flex-grow flex items-center justify-center p-5">
    <div class="w-full max-w-4xl bg-white/95 backdrop-blur-sm rounded-2xl shadow-2xl border border-gray-200 p-8 md:p-10 transition-all duration-300">
      
      <!-- Back Button -->
      <div class="mb-6">
        <a href="{% url 'home' %}" class="inline-flex items-center gap-2 text-gray-600 hover:text-red-600 transition">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
          <span class="font-medium">Back</span>
        </a>
      </div>

      <!-- Decorative red line -->
      <div class="w-20 h-1 bg-gradient-to-r from-red-500 to-red-300 mx-auto mb-5 rounded-full"></div>
      
      <div class="text-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">User Information</h2>
        <p class="text-gray-500 text-sm mt-1">Complete your profile details</p>
      </div>

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        <!-- User Information Section -->
        <div class="mb-8">
          <h3 class="text-xl font-semibold text-gray-800 mb-4 pb-2 border-b border-gray-200">Personal Information</h3>
          
          <!-- Name Fields -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-4">
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">First Name</label>
              <input type="text" name="first_name" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200" placeholder="Enter first name">
            </div>
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">Middle Initial</label>
              <input type="text" name="middle_initial" maxlength="1" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200" placeholder="M.I.">
            </div>
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">Last Name</label>
              <input type="text" name="last_name" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200" placeholder="Enter last name">
            </div>
          </div>
          
          <!-- Date of Birth and Place of Birth -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">Date of Birth</label>
              <input type="date" name="dob" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200">
            </div>
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">Place of Birth</label>
              <input type="text" name="pob" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200" placeholder="City, Province">
            </div>
          </div>
          
          <!-- Profile Photo and Gender -->
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">Upload Profile Photo</label>
              <div class="flex items-center gap-3">
                <div class="w-16 h-16 bg-gray-100 rounded-full flex items-center justify-center border-2 border-dashed border-gray-300">
                  <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"></path>
                  </svg>
                </div>
                <div class="flex-1">
                  <input type="file" name="profile_photo" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100">
                  <p class="text-xs text-gray-500 mt-1">JPEG, PNG, JPG (Max 5MB)</p>
                </div>
              </div>
            </div>
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">Gender</label>
              <div class="flex gap-6">
                <label class="flex items-center gap-2">
                  <input type="radio" name="gender" value="male" class="text-red-600 focus:ring-red-500">
                  <span class="text-gray-700">Male</span>
                </label>
                <label class="flex items-center gap-2">
                  <input type="radio" name="gender" value="female" class="text-red-600 focus:ring-red-500">
                  <span class="text-gray-700">Female</span>
                </label>
                <label class="flex items-center gap-2">
                  <input type="radio" name="gender" value="other" class="text-red-600 focus:ring-red-500">
                  <span class="text-gray-700">Other</span>
                </label>
              </div>
            </div>
          </div>
        </div>
        
        <!-- School Identification Section -->
        <div class="mb-8">
          <h3 class="text-xl font-semibold text-gray-800 mb-4 pb-2 border-b border-gray-200">School Identification</h3>
          
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">College</label>
              <select name="college" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200">
                <option value="">Select College</option>
                <option value="COE">College of Engineering</option>
                <option value="COC">College of Computing</option>
                <option value="CBA">College of Business Administration</option>
                <option value="CAS">College of Arts and Sciences</option>
                <option value="CED">College of Education</option>
                <option value="CON">College of Nursing</option>
              </select>
            </div>
            <div>
              <label class="block text-gray-700 font-medium text-sm mb-2">Position</label>
              <input type="text" name="position" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200" placeholder="e.g., Student, Faculty, Staff">
            </div>
          </div>
          
          <div>
            <label class="block text-gray-700 font-medium text-sm mb-2">Office</label>
            <input type="text" name="office" class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:bg-white focus:border-red-400 transition-all duration-200" placeholder="Enter office/department">
          </div>
        </div>
        
        <!-- Next Step Button -->
        <div class="flex justify-end">
          <button type="submit" class="px-8 py-3 bg-gradient-to-r from-red-700 to-red-800 hover:from-red-800 hover:to-red-900 text-white font-semibold rounded-xl shadow-md transition duration-200">
            Next Step →
          </button>
        </div>
      </form>
    </div>
  </main>

  <script>
    // Simple form submission handler (for demo)
    const form = document.querySelector('form');
    if (form) {
      form.addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Information saved! Proceeding to next step.');
        // In production, this would submit to the backend
      });
    }
  </script>
</body>
</html>
